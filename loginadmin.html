<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Masjid Al-Khotib</title>
  <link rel="stylesheet" href="admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">
        <i class="fas fa-mosque"></i>
        <span>Masjid Al-Khotib</span>
      </div>
      <div class="login-header">
        <h2>Login Admin</h2>
        <p>Masuk untuk mengelola konten halaman umum masjid.</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Masuk</button>
      </form>
      <p class="error" id="errorMsg" style="display:none;color:#ef4444;margin-top:1rem;">Username atau password salah.</p>
      <p style="margin-top:1.5rem;color:#4b5563;font-size:.95rem;">Login demo: <strong>admin</strong> / <strong>admin123</strong></p>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
